<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#22c55e">
<title>Turbo English A1 · Principiante</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800;900&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1a47b8;--sun:#f5a623;--sun-deep:#e07b00;--terra:#c94f2c;
  --sky:#4ab8f5;--sand:#fff9ef;--ink:#1c1208;--muted:#7a6a58;
  --shadow:rgba(28,18,8,0.09);
  --green:#22c55e;--green-lt:#bbf7d0;--green-dk:#166534;
  --red:#ef4444;--red-lt:#fee2e2;--red-dk:#991b1b;
  --yellow:#f1c40f;--purple:#a855f7;--orange:#f59e0b;
  --lc:#22c55e;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--sand);color:var(--ink);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ── ATMOSPHERE ── */
.sky-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:linear-gradient(180deg,#87ceeb 0%,#b8e4f7 28%,#d8eefa 52%,#fff9ef 100%);}
.sun-orb{position:fixed;top:-55px;right:-35px;width:200px;height:200px;border-radius:50%;z-index:0;pointer-events:none;
  background:radial-gradient(circle at 38% 38%,#ffe877,#f5a623 55%,#e07b00);
  box-shadow:0 0 0 28px rgba(245,166,35,0.12),0 0 0 60px rgba(245,166,35,0.07),0 0 0 100px rgba(245,166,35,0.035);
  animation:sunpulse 5s ease-in-out infinite;}
@keyframes sunpulse{
  0%,100%{box-shadow:0 0 0 28px rgba(245,166,35,0.12),0 0 0 60px rgba(245,166,35,0.07),0 0 0 100px rgba(245,166,35,0.035);}
  50%{box-shadow:0 0 0 42px rgba(245,166,35,0.16),0 0 0 85px rgba(245,166,35,0.09),0 0 0 140px rgba(245,166,35,0.045);}}
.clouds{position:fixed;top:0;left:0;right:0;height:220px;z-index:0;pointer-events:none;overflow:hidden;}
.cloud{position:absolute;background:white;border-radius:50px;opacity:0.8;animation:drift linear infinite;}
.cloud::before,.cloud::after{content:'';position:absolute;background:white;border-radius:50%;}
.c1{width:110px;height:32px;top:28px;animation-duration:70s;animation-delay:-5s;}.c1::before{width:52px;height:48px;top:-25px;left:14px;}.c1::after{width:40px;height:36px;top:-17px;left:50px;}
.c2{width:80px;height:24px;top:68px;animation-duration:90s;animation-delay:-40s;opacity:0.55;}.c2::before{width:38px;height:34px;top:-18px;left:10px;}.c2::after{width:30px;height:26px;top:-13px;left:34px;}
.c3{width:130px;height:36px;top:12px;animation-duration:115s;animation-delay:-65s;opacity:0.65;}.c3::before{width:62px;height:54px;top:-28px;left:18px;}.c3::after{width:48px;height:42px;top:-20px;left:62px;}
.c4{width:68px;height:20px;top:90px;animation-duration:80s;animation-delay:-25s;opacity:0.4;}.c4::before{width:32px;height:28px;top:-15px;left:8px;}.c4::after{width:26px;height:22px;top:-10px;left:30px;}
@keyframes drift{from{transform:translateX(-220px);}to{transform:translateX(calc(100vw + 220px));}}

.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 18px 80px;}

/* ── HEADER ── */
.site-header{padding:24px 0 16px;text-align:center;animation:riseUp 0.6s ease both;}
.back-link{display:inline-flex;align-items:center;gap:6px;background:var(--blue);color:white;text-decoration:none;
  font-size:12px;font-weight:800;padding:6px 14px;border-radius:20px;margin-bottom:12px;letter-spacing:0.05em;
  box-shadow:0 3px 10px rgba(26,71,184,0.25);}
.brand-turbo{font-family:'Boogaloo',cursive;font-size:clamp(36px,10vw,48px);line-height:0.88;color:var(--sun-deep);
  -webkit-text-stroke:2px var(--terra);text-shadow:4px 4px 0 rgba(201,79,44,0.18);display:block;}
.brand-english{font-family:'Boogaloo',cursive;font-size:clamp(26px,7vw,34px);line-height:0.9;color:var(--blue);
  -webkit-text-stroke:1.5px var(--ink);text-shadow:3px 3px 0 rgba(28,18,8,0.1);display:block;}
.level-pill{display:inline-block;background:var(--lc);color:white;font-family:'Boogaloo',cursive;
  font-size:14px;padding:4px 16px;border-radius:20px;letter-spacing:1px;margin-top:8px;}

/* ── SECTION LABEL ── */
.sec-label{font-size:10px;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);
  margin-bottom:12px;padding-left:2px;display:flex;align-items:center;gap:10px;}
.sec-label::after{content:'';flex:1;height:2px;background:linear-gradient(to right,rgba(26,71,184,0.15),transparent);border-radius:2px;}

/* ── TOPIC TILES ── */
.tile-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px;}
.tile{background:white;border-radius:16px;padding:0;cursor:pointer;transition:transform 0.15s,box-shadow 0.18s;
  box-shadow:0 4px 16px var(--shadow);position:relative;overflow:hidden;border:none;text-align:left;width:100%;}
.tile:active{transform:scale(0.97);box-shadow:0 2px 8px var(--shadow);}
.tile-stripe{height:5px;}
.tile-body{padding:12px 12px 12px;}
.tile-emoji{font-size:1.8rem;display:block;margin-bottom:5px;}
.tile-name{font-family:'Boogaloo',cursive;font-size:1rem;color:var(--ink);line-height:1.2;margin-bottom:2px;}
.tile-sub{font-size:0.68rem;color:var(--muted);font-weight:600;margin-bottom:7px;}
.tile-stars{font-size:0.78rem;letter-spacing:2px;}
.tile-badge{position:absolute;top:8px;right:8px;font-size:0.6rem;font-weight:800;letter-spacing:0.5px;
  text-transform:uppercase;padding:2px 7px;border-radius:10px;color:white;}
.tile-badge.lockin{background:var(--red);}
.tile-badge.revision{background:var(--orange);}

/* ── GAME HEADER ── */
#game-view{display:none;}
#results-view{display:none;}
.game-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-top:22px;}
.back-btn{background:var(--blue);border:none;color:white;border-radius:50%;width:36px;height:36px;
  font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 3px 10px rgba(26,71,184,0.3);}
.game-topic-name{font-family:'Boogaloo',cursive;font-size:1.25rem;color:var(--ink);flex:1;}
.stat-box{background:white;border-radius:12px;padding:5px 12px;text-align:center;box-shadow:0 3px 10px var(--shadow);}
.stat-val{font-family:'Boogaloo',cursive;font-size:1.2rem;color:var(--blue);display:block;}
.stat-label{font-size:0.6rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}
.mode-pill{display:inline-block;font-family:'Boogaloo',cursive;font-size:11px;font-weight:800;
  padding:3px 10px;border-radius:12px;margin-bottom:8px;letter-spacing:0.5px;}
.mode-pill.learn{background:rgba(34,197,94,0.15);color:var(--green-dk);}
.mode-pill.lockin{background:rgba(239,68,68,0.15);color:var(--red-dk);}
.mode-pill.revision{background:rgba(245,158,11,0.15);color:#92400e;}

/* ── PROGRESS ── */
.progress-bar-wrap{background:rgba(0,0,0,0.06);border-radius:10px;height:6px;margin-bottom:18px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--lc),var(--sky));border-radius:10px;transition:width 0.3s;}

/* ── QUESTION CARD ── */
.question-card{background:white;border-radius:20px;overflow:hidden;margin-bottom:14px;box-shadow:0 6px 24px var(--shadow);}
.question-stripe{height:5px;background:linear-gradient(90deg,var(--lc),var(--sky));}
.question-stripe.lockin-stripe{background:linear-gradient(90deg,var(--red),var(--orange));}
.question-stripe.revision-stripe{background:linear-gradient(90deg,var(--orange),var(--yellow));}
.question-body{padding:22px 20px 18px;text-align:center;}
.q-prompt-label{font-size:0.68rem;font-weight:800;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.q-spanish{font-family:'Boogaloo',cursive;font-size:2rem;color:var(--ink);margin-bottom:6px;line-height:1.2;}
.q-hint{font-size:0.78rem;color:var(--muted);font-style:italic;min-height:1.2em;}

/* ── ANSWER BUTTONS (Learn) ── */
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.ans-btn{background:white;border:2.5px solid rgba(0,0,0,0.08);border-radius:14px;color:var(--ink);
  font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:700;padding:13px 8px;cursor:pointer;
  transition:all 0.15s;text-align:center;line-height:1.2;box-shadow:0 3px 10px var(--shadow);}
.ans-btn:active{transform:scale(0.97);}
.ans-btn.correct{background:var(--green-lt);border-color:var(--green);color:var(--green-dk);}
.ans-btn.wrong{background:var(--red-lt);border-color:var(--red);color:var(--red-dk);}
.ans-btn:disabled{cursor:default;}

/* ── LOCK IN INPUT ── */
.lockin-wrap{margin-bottom:14px;}
.lockin-input{width:100%;background:white;border:2.5px solid rgba(0,0,0,0.1);border-radius:14px;
  padding:14px 50px 14px 16px;font-family:'Nunito',sans-serif;font-size:1.05rem;font-weight:700;
  color:var(--ink);outline:none;transition:border-color 0.2s;box-shadow:0 3px 10px var(--shadow);}
.lockin-input:focus{border-color:var(--red);}
.lockin-input.correct{border-color:var(--green);background:var(--green-lt);}
.lockin-input.wrong{border-color:var(--red);background:var(--red-lt);}
.lockin-row{display:flex;gap:10px;margin-top:10px;}
.lockin-submit{flex:1;background:var(--red);color:white;border:none;border-radius:14px;
  font-family:'Boogaloo',cursive;font-size:1.1rem;padding:13px;cursor:pointer;
  box-shadow:0 4px 14px rgba(239,68,68,0.35);}
.lockin-submit:active{opacity:0.85;}
.mic-btn{background:white;border:2px solid rgba(0,0,0,0.1);border-radius:14px;padding:13px 16px;
  font-size:1.2rem;cursor:pointer;box-shadow:0 3px 10px var(--shadow);}
.mic-btn.listening{animation:micpulse 0.7s ease-in-out infinite;border-color:var(--red);}
@keyframes micpulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.6;transform:scale(0.95);}}

/* ── FEEDBACK ── */
.feedback-row{min-height:36px;margin-bottom:6px;border-radius:12px;padding:8px 14px;font-weight:800;
  font-size:1rem;text-align:center;transition:all 0.2s;}
.feedback-row:empty{padding:0;}
.fb-correct{background:var(--green-lt);color:var(--green-dk);border:2px solid rgba(34,197,94,0.3);}
.fb-wrong{background:var(--red-lt);color:var(--red-dk);border:2px solid rgba(239,68,68,0.3);}

/* ── RESULTS ── */
.results-card{background:white;border-radius:22px;overflow:hidden;box-shadow:0 8px 30px var(--shadow);margin-top:22px;}
.results-stripe{height:6px;background:linear-gradient(90deg,var(--lc),var(--sky),var(--sun));}
.results-body{padding:28px 22px;text-align:center;}
.results-emoji{font-size:3.5rem;display:block;margin-bottom:10px;}
.results-title{font-family:'Boogaloo',cursive;font-size:2rem;color:var(--ink);margin-bottom:4px;}
.results-topic{color:var(--muted);font-size:0.85rem;font-weight:600;margin-bottom:18px;}
.results-stars{font-size:2.2rem;margin-bottom:18px;display:block;letter-spacing:4px;}
.results-stats{display:flex;justify-content:center;gap:16px;margin-bottom:20px;}
.r-stat{background:var(--sand);border-radius:14px;padding:14px 20px;text-align:center;}
.r-stat-val{font-family:'Boogaloo',cursive;font-size:1.8rem;color:var(--blue);display:block;}
.r-stat-label{font-size:0.68rem;font-weight:800;color:var(--muted);text-transform:uppercase;}
.best-time-note{font-size:0.8rem;font-weight:700;color:var(--terra);margin-bottom:18px;min-height:1.2em;}

/* ── APRENDE DE TUS ERRORES ── */
.errores-section{background:var(--red-lt);border:2px solid rgba(239,68,68,0.25);border-radius:16px;
  padding:16px 18px;margin-bottom:20px;text-align:left;}
.errores-title{font-family:'Boogaloo',cursive;font-size:1.1rem;color:var(--red-dk);margin-bottom:12px;
  display:flex;align-items:center;gap:8px;}
.error-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;
  border-bottom:1px solid rgba(239,68,68,0.15);font-size:0.88rem;}
.error-row:last-child{border:none;}
.error-es{color:var(--ink);font-weight:700;}
.error-en{color:var(--green-dk);font-weight:800;}
.error-arrow{color:var(--muted);margin:0 6px;}

.btn-primary{background:linear-gradient(135deg,var(--lc),var(--sky));color:white;border:none;border-radius:14px;
  font-family:'Boogaloo',cursive;font-size:1.2rem;padding:14px 28px;cursor:pointer;
  box-shadow:0 5px 18px rgba(26,71,184,0.25);display:inline-block;margin:5px;}
.btn-secondary{background:white;color:var(--blue);border:2px solid rgba(26,71,184,0.2);border-radius:14px;
  font-family:'Boogaloo',cursive;font-size:1.1rem;padding:13px 24px;cursor:pointer;
  display:inline-block;margin:5px;box-shadow:0 3px 10px var(--shadow);}
.footer-copy{text-align:center;font-size:11px;font-weight:700;color:rgba(28,18,8,0.3);
  letter-spacing:0.04em;padding:24px 0 10px;}
@keyframes riseUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes pop{from{transform:scale(0.92);}to{transform:scale(1);}}
.pop{animation:pop 0.18s ease;}

/* ── FLOATERS ── */
.floater{position:fixed;pointer-events:none;z-index:9999;font-size:1.8rem;animation:floatUp 0.9s ease forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(0.5);}100%{opacity:0;transform:translateY(-90px) scale(1.4);}}
</style>
</head>
<body>
<div class="sky-bg"></div>
<div class="sun-orb"></div>
<div class="clouds"><div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div><div class="cloud c4"></div></div>

<div class="wrap">

<!-- HUB -->
<div id="hub-view">
  <header class="site-header">
    <a href="index.html" class="back-link">← Turbo English</a>
    <span class="brand-turbo">Turbo</span>
    <span class="brand-english">English</span>
    <span class="level-pill">A1 · Principiante</span>
  </header>
  <div class="sec-label">Elige un tema · Choose a topic</div>
  <div class="tile-grid" id="tile-grid"></div>
  <div class="footer-copy">© Turbo English · Imaginación y Perseverancia</div>
</div>

<!-- GAME -->
<div id="game-view">
  <div class="game-header">
    <button class="back-btn" onclick="showHub()">←</button>
    <div>
      <div class="game-topic-name" id="game-topic-name"></div>
      <span class="mode-pill" id="mode-pill"></span>
    </div>
    <div class="stat-box"><span class="stat-val" id="stat-score">0</span><span class="stat-label">aciertos</span></div>
    <div class="stat-box"><span class="stat-val" id="stat-timer">0s</span><span class="stat-label">tiempo</span></div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar" style="width:0%"></div></div>
  <div class="question-card">
    <div class="question-stripe" id="question-stripe"></div>
    <div class="question-body">
      <div class="q-prompt-label" id="q-prompt-label">¿Cómo se dice en inglés?</div>
      <div class="q-spanish" id="q-spanish"></div>
      <div class="q-hint" id="q-hint"></div>
    </div>
  </div>
  <!-- Multiple choice -->
  <div class="answers-grid" id="answers-grid"></div>
  <!-- Lock In -->
  <div class="lockin-wrap" id="lockin-wrap" style="display:none">
    <input class="lockin-input" id="lockin-input" type="text"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      placeholder="Escribe en inglés…"/>
    <div class="lockin-row">
      <button class="lockin-submit" onclick="submitLockIn()">Comprobar ✓</button>
      <button class="mic-btn" id="mic-btn">🎤</button>
    </div>
  </div>
  <div class="feedback-row" id="feedback-row"></div>
</div>

<!-- RESULTS -->
<div id="results-view">
  <div class="results-card">
    <div class="results-stripe"></div>
    <div class="results-body">
      <span class="results-emoji" id="results-emoji">🎉</span>
      <div class="results-title" id="results-title">¡Bien hecho!</div>
      <div class="results-topic" id="results-topic"></div>
      <span class="results-stars" id="results-stars"></span>
      <div class="results-stats">
        <div class="r-stat"><span class="r-stat-val" id="r-score"></span><span class="r-stat-label">correctas</span></div>
        <div class="r-stat"><span class="r-stat-val" id="r-time"></span><span class="r-stat-label">segundos</span></div>
      </div>
      <div class="best-time-note" id="best-time-note"></div>
      <div class="errores-section" id="errores-section" style="display:none">
        <div class="errores-title">📚 Aprende de tus errores</div>
        <div id="errores-list"></div>
      </div>
      <button class="btn-primary" onclick="replayGame()">🔄 Otra vez</button>
      <button class="btn-secondary" onclick="showHub()">← Temas</button>
    </div>
  </div>
  <div class="footer-copy">© Turbo English · Imaginación y Perseverancia</div>
</div>

</div><!-- /wrap -->

<script>
const STORAGE_PREFIX='te_a1_';

// ═══════════════════════════════════════════════════
// TOPICS 1–8 + special levels 9 & 10
// Each topic has a 'mode':
//   'learn'    = multiple choice (default)
//   'lockin'   = type/speak the answer
//   'revision' = quickfire random mix of previous topics
//
// LOOP STRUCTURE:
//   Topics 1,2,3  → Learn (multiple choice)
//   Topic 4       → Lock In (reinforces 1,2,3)
//   Topics 5,6,7  → Learn
//   Topic 8       → Lock In (reinforces 5,6,7)
//   Topic 9       → Quickfire revision of ALL (learn)
//   Topic 10      → Quickfire revision of ALL (lockin)
// ═══════════════════════════════════════════════════
const TOPICS=[
  // ── BLOCK 1 ──
  {id:'saludos',emoji:'👋',name:'Saludos',sub:'Greetings',mode:'learn',
   words:[
    {es:'hola',en:'hello'},{es:'buenos días',en:'good morning'},{es:'buenas tardes',en:'good afternoon'},
    {es:'buenas noches',en:'good evening'},{es:'adiós',en:'goodbye'},{es:'hasta luego',en:'see you later'},
    {es:'hasta mañana',en:'see you tomorrow'},{es:'por favor',en:'please'},{es:'gracias',en:'thank you'},
    {es:'de nada',en:'you\'re welcome'},{es:'perdona',en:'excuse me'},{es:'lo siento',en:'I\'m sorry'},
    {es:'¿cómo estás?',en:'how are you?'},{es:'bien, gracias',en:'fine, thank you'},
    {es:'¿cómo te llamas?',en:'what\'s your name?'},{es:'me llamo...',en:'my name is...'},
    {es:'mucho gusto',en:'nice to meet you'},{es:'¿de dónde eres?',en:'where are you from?'},
    {es:'soy de España',en:'I\'m from Spain'},{es:'¿cuántos años tienes?',en:'how old are you?'},
  ]},
  {id:'numeros',emoji:'🔢',name:'Números',sub:'Numbers',mode:'learn',
   words:[
    {es:'uno',en:'one'},{es:'dos',en:'two'},{es:'tres',en:'three'},{es:'cuatro',en:'four'},
    {es:'cinco',en:'five'},{es:'seis',en:'six'},{es:'siete',en:'seven'},{es:'ocho',en:'eight'},
    {es:'nueve',en:'nine'},{es:'diez',en:'ten'},{es:'once',en:'eleven'},{es:'doce',en:'twelve'},
    {es:'veinte',en:'twenty'},{es:'treinta',en:'thirty'},{es:'cuarenta',en:'forty'},
    {es:'cincuenta',en:'fifty'},{es:'cien',en:'one hundred'},{es:'primero',en:'first'},
    {es:'segundo',en:'second'},{es:'tercero',en:'third'},
  ]},
  {id:'colores',emoji:'🎨',name:'Colores',sub:'Colours',mode:'learn',
   words:[
    {es:'rojo',en:'red'},{es:'azul',en:'blue'},{es:'verde',en:'green'},{es:'amarillo',en:'yellow'},
    {es:'naranja',en:'orange'},{es:'morado',en:'purple'},{es:'rosa',en:'pink'},{es:'blanco',en:'white'},
    {es:'negro',en:'black'},{es:'gris',en:'grey'},{es:'marrón',en:'brown'},{es:'claro',en:'light'},
    {es:'oscuro',en:'dark'},{es:'brillante',en:'bright'},{es:'azul claro',en:'light blue'},
    {es:'rojo oscuro',en:'dark red'},{es:'dorado',en:'gold'},{es:'plateado',en:'silver'},
    {es:'beige',en:'beige'},{es:'turquesa',en:'turquoise'},
  ]},
  // ── LOCK IN 1 — reinforces saludos, numeros, colores ──
  {id:'lockin1',emoji:'🔒',name:'¡A escribir! (1–3)',sub:'Lock In · Temas 1–3',mode:'lockin',reinforces:[0,1,2]},

  // ── BLOCK 2 ──
  {id:'familia',emoji:'👨‍👩‍👧',name:'La familia',sub:'Family',mode:'learn',
   words:[
    {es:'la madre',en:'mother'},{es:'el padre',en:'father'},{es:'los padres',en:'parents'},
    {es:'el hijo',en:'son'},{es:'la hija',en:'daughter'},{es:'el hermano',en:'brother'},
    {es:'la hermana',en:'sister'},{es:'el abuelo',en:'grandfather'},{es:'la abuela',en:'grandmother'},
    {es:'los abuelos',en:'grandparents'},{es:'el tío',en:'uncle'},{es:'la tía',en:'aunt'},
    {es:'el primo',en:'cousin (male)'},{es:'la prima',en:'cousin (female)'},{es:'el marido',en:'husband'},
    {es:'la mujer',en:'wife'},{es:'el novio',en:'boyfriend'},{es:'la novia',en:'girlfriend'},
    {es:'el bebé',en:'baby'},{es:'los niños',en:'children'},
  ]},
  {id:'cuerpo',emoji:'🧍',name:'El cuerpo',sub:'Body',mode:'learn',
   words:[
    {es:'la cabeza',en:'head'},{es:'el pelo',en:'hair'},{es:'la cara',en:'face'},
    {es:'los ojos',en:'eyes'},{es:'la nariz',en:'nose'},{es:'la boca',en:'mouth'},
    {es:'las orejas',en:'ears'},{es:'el cuello',en:'neck'},{es:'el brazo',en:'arm'},
    {es:'la mano',en:'hand'},{es:'los dedos',en:'fingers'},{es:'la pierna',en:'leg'},
    {es:'el pie',en:'foot'},{es:'los pies',en:'feet'},{es:'la espalda',en:'back'},
    {es:'el estómago',en:'stomach'},{es:'el pecho',en:'chest'},{es:'el hombro',en:'shoulder'},
    {es:'la rodilla',en:'knee'},{es:'el codo',en:'elbow'},
  ]},
  {id:'casa',emoji:'🏠',name:'La casa',sub:'Home',mode:'learn',
   words:[
    {es:'la casa',en:'house'},{es:'el piso',en:'flat / apartment'},{es:'la habitación',en:'room'},
    {es:'el dormitorio',en:'bedroom'},{es:'el baño',en:'bathroom'},{es:'la cocina',en:'kitchen'},
    {es:'el salón',en:'living room'},{es:'el comedor',en:'dining room'},{es:'la puerta',en:'door'},
    {es:'la ventana',en:'window'},{es:'la escalera',en:'stairs'},{es:'el jardín',en:'garden'},
    {es:'la mesa',en:'table'},{es:'la silla',en:'chair'},{es:'la cama',en:'bed'},
    {es:'el sofá',en:'sofa'},{es:'la televisión',en:'television'},{es:'el frigorífico',en:'fridge'},
    {es:'la ducha',en:'shower'},{es:'el armario',en:'wardrobe'},
  ]},
  // ── LOCK IN 2 — reinforces familia, cuerpo, casa ──
  {id:'lockin2',emoji:'🔒',name:'¡A escribir! (5–7)',sub:'Lock In · Temas 5–7',mode:'lockin',reinforces:[4,5,6]},

  // ── QUICKFIRE REVISION ──
  {id:'revision_learn',emoji:'⚡',name:'¡Repaso rápido!',sub:'Revisión · Todo A1 · Elección múltiple',mode:'revision_learn'},
  {id:'revision_lockin',emoji:'🏆',name:'¡Repaso escrito!',sub:'Revisión · Todo A1 · A escribir',mode:'revision_lockin'},
];

// ─── Build word pools for Lock In and Revision from referenced topics ───
function buildWordPool(topicIndices){
  let pool=[];
  topicIndices.forEach(i=>{
    if(TOPICS[i]&&TOPICS[i].words) pool=[...pool,...TOPICS[i].words];
  });
  return pool;
}
function getRevisionPool(){
  return TOPICS.filter(t=>t.words).reduce((a,t)=>[...a,...t.words],[]);
}

// ─── State ───
let currentTopic=null,currentWords=[],currentIndex=0,score=0;
let startTime=null,timerInterval=null,elapsedSeconds=0,answered=false;
let missed=[]; // {es,en}
let recognition=null,isListening=false;

// ─── Storage ───
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function getStars(id){return parseInt(lsGet(STORAGE_PREFIX+id+'_stars')||'0');}
function getBestTime(id){const v=lsGet(STORAGE_PREFIX+id+'_best');return v===null?null:parseInt(v);}
function saveResult(id,stars,time){
  if(stars>getStars(id))lsSet(STORAGE_PREFIX+id+'_stars',stars);
  const p=getBestTime(id);if(p===null||time<p)lsSet(STORAGE_PREFIX+id+'_best',time);
}

// ─── Hub ───
function renderHub(){
  const grid=document.getElementById('tile-grid');
  grid.innerHTML='';
  TOPICS.forEach((t,i)=>{
    const stars=getStars(t.id);
    const s=stars>0?'⭐'.repeat(stars)+'☆'.repeat(3-stars):'☆☆☆';
    const d=document.createElement('button');
    d.className='tile';
    const stripeColor=
      t.mode==='lockin'?'background:linear-gradient(90deg,var(--red),var(--orange))':
      t.mode==='revision_learn'||t.mode==='revision_lockin'?'background:linear-gradient(90deg,var(--orange),var(--yellow))':
      'background:linear-gradient(90deg,var(--lc),var(--sky))';
    const badge=
      t.mode==='lockin'?'<span class="tile-badge lockin">Lock In</span>':
      t.mode==='revision_learn'||t.mode==='revision_lockin'?'<span class="tile-badge revision">Repaso</span>':'';
    d.innerHTML=`<div class="tile-stripe" style="${stripeColor}"></div>
      <div class="tile-body">
        <span class="tile-emoji">${t.emoji}</span>
        <div class="tile-name">${t.name}</div>
        <div class="tile-sub">${t.sub}</div>
        <div class="tile-stars">${s}</div>
      </div>${badge}`;
    d.onclick=()=>startGame(t);
    grid.appendChild(d);
  });
}

function showHub(){
  document.getElementById('hub-view').style.display='block';
  document.getElementById('game-view').style.display='none';
  document.getElementById('results-view').style.display='none';
  clearInterval(timerInterval);
  stopSpeech();
  renderHub();
}

// ─── Start Game ───
function startGame(t){
  currentTopic=t;
  missed=[];

  // Build word list based on mode
  if(t.mode==='lockin'&&t.reinforces){
    currentWords=shuffle(buildWordPool(t.reinforces)).slice(0,10);
  } else if(t.mode==='revision_learn'||t.mode==='revision_lockin'){
    currentWords=shuffle(getRevisionPool()).slice(0,12);
  } else {
    currentWords=shuffle([...t.words]).slice(0,10);
  }

  currentIndex=0;score=0;elapsedSeconds=0;answered=false;

  document.getElementById('hub-view').style.display='none';
  document.getElementById('game-view').style.display='block';
  document.getElementById('results-view').style.display='none';
  document.getElementById('game-topic-name').textContent=t.emoji+' '+t.name;
  document.getElementById('stat-score').textContent='0';
  document.getElementById('stat-timer').textContent='0s';
  document.getElementById('feedback-row').textContent='';
  document.getElementById('feedback-row').className='feedback-row';

  // Mode pill
  const pill=document.getElementById('mode-pill');
  const isLockIn=t.mode==='lockin'||t.mode==='revision_lockin';
  const isRevision=t.mode==='revision_learn'||t.mode==='revision_lockin';
  pill.textContent=isLockIn?'🔒 Escribe la respuesta':isRevision?'⚡ Repaso rápido':'🎯 Elección múltiple';
  pill.className='mode-pill '+(isLockIn?'lockin':isRevision?'revision':'learn');

  // Stripe colour
  const stripe=document.getElementById('question-stripe');
  stripe.className='question-stripe'+(isLockIn?' lockin-stripe':isRevision?' revision-stripe':'');

  // Show/hide input vs grid
  document.getElementById('answers-grid').style.display=isLockIn?'none':'grid';
  document.getElementById('lockin-wrap').style.display=isLockIn?'block':'none';

  // Prompt label
  document.getElementById('q-prompt-label').textContent=
    isLockIn?'✍️ Escribe en inglés':'¿Cómo se dice en inglés?';

  startTime=Date.now();
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    elapsedSeconds=Math.floor((Date.now()-startTime)/1000);
    document.getElementById('stat-timer').textContent=elapsedSeconds+'s';
  },500);

  showQuestion();
}

// ─── Show Question ───
function showQuestion(){
  if(currentIndex>=currentWords.length){endGame();return;}
  answered=false;
  const w=currentWords[currentIndex];
  document.getElementById('q-spanish').textContent=w.es;
  document.getElementById('q-hint').textContent='';
  document.getElementById('feedback-row').textContent='';
  document.getElementById('feedback-row').className='feedback-row';
  document.getElementById('progress-bar').style.width=(currentIndex/currentWords.length*100)+'%';

  const isLockIn=currentTopic.mode==='lockin'||currentTopic.mode==='revision_lockin';

  if(isLockIn){
    const inp=document.getElementById('lockin-input');
    inp.value='';inp.className='lockin-input';inp.disabled=false;
    document.querySelector('.lockin-submit').style.display='block';
    document.getElementById('mic-btn').className='mic-btn';
    setTimeout(()=>inp.focus(),120);
  } else {
    const correct=w.en;
    // Build distractors from the full pool
    const allWords=currentTopic.mode==='revision_learn'?getRevisionPool():
                   (currentTopic.words||buildWordPool(currentTopic.reinforces||[]));
    const others=shuffle(allWords.filter(x=>x.en!==correct).map(x=>x.en)).slice(0,3);
    const opts=shuffle([correct,...others]);
    const grid=document.getElementById('answers-grid');
    grid.innerHTML='';
    opts.forEach(o=>{
      const b=document.createElement('button');
      b.className='ans-btn';b.textContent=o;
      b.onclick=()=>selectAnswer(b,o,correct,w.es);
      grid.appendChild(b);
    });
  }
}

// ─── Multiple Choice ───
function selectAnswer(btn,chosen,correct,esWord){
  if(answered)return;answered=true;
  document.querySelectorAll('.ans-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct)b.classList.add('correct');
  });
  if(chosen===correct){
    btn.classList.add('correct');score++;
    document.getElementById('stat-score').textContent=score;
    showFb(true,randomPraise());
    burst(btn);
  } else {
    btn.classList.add('wrong');
    missed.push({es:esWord,en:correct});
    showFb(false,'✗ La respuesta es: <strong>'+correct+'</strong>');
  }
  currentIndex++;
  setTimeout(showQuestion,1200);
}

// ─── Lock In ───
function submitLockIn(){
  if(answered)return;
  const inp=document.getElementById('lockin-input');
  const val=inp.value.trim();
  if(!val){inp.focus();return;}
  answered=true;
  stopSpeech();
  const w=currentWords[currentIndex];
  const isRight=normalise(val)===normalise(w.en);
  inp.disabled=true;
  document.querySelector('.lockin-submit').style.display='none';
  if(isRight){
    inp.className='lockin-input correct';
    score++;
    document.getElementById('stat-score').textContent=score;
    showFb(true,randomPraise());
    burst(inp);
  } else {
    inp.className='lockin-input wrong';
    missed.push({es:w.es,en:w.en});
    showFb(false,'✗ La respuesta es: <strong>'+w.en+'</strong>');
  }
  currentIndex++;
  setTimeout(showQuestion,1400);
}

document.getElementById('lockin-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!answered)submitLockIn();
});

// ─── Speech ───
function initSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){document.getElementById('mic-btn').style.display='none';return;}
  recognition=new SR();
  recognition.lang='en-GB';recognition.continuous=false;recognition.interimResults=false;
  recognition.onresult=e=>{
    document.getElementById('lockin-input').value=e.results[0][0].transcript;
    isListening=false;document.getElementById('mic-btn').className='mic-btn';
  };
  recognition.onerror=()=>{isListening=false;document.getElementById('mic-btn').className='mic-btn';};
  recognition.onend=()=>{isListening=false;document.getElementById('mic-btn').className='mic-btn';};
}
document.getElementById('mic-btn').addEventListener('click',()=>{
  if(!recognition)initSpeech();
  if(!recognition)return;
  if(isListening){stopSpeech();return;}
  try{recognition.start();isListening=true;document.getElementById('mic-btn').className='mic-btn listening';}
  catch(e){}
});
function stopSpeech(){
  if(recognition&&isListening){try{recognition.stop();}catch(e){}isListening=false;}
}

// ─── Feedback bar ───
function showFb(ok,msg){
  const el=document.getElementById('feedback-row');
  el.className='feedback-row '+(ok?'fb-correct':'fb-wrong');
  el.innerHTML=msg;
  el.classList.add('pop');
}

// ─── End Game ───
function endGame(){
  clearInterval(timerInterval);stopSpeech();
  const total=currentWords.length,pct=score/total;
  const stars=pct>=0.9?3:pct>=0.6?2:pct>=0.3?1:0;
  const prevBest=getBestTime(currentTopic.id);
  const isNewBest=prevBest===null||elapsedSeconds<prevBest;
  saveResult(currentTopic.id,stars,elapsedSeconds);

  document.getElementById('hub-view').style.display='none';
  document.getElementById('game-view').style.display='none';
  document.getElementById('results-view').style.display='block';

  const emojis=['😬','👏','🎉','🏆'];
  document.getElementById('results-emoji').textContent=emojis[stars];
  const titles=['¡Sigue intentándolo!','¡Bien hecho!','¡Muy bien!','¡Perfecto!'];
  document.getElementById('results-title').textContent=titles[stars];
  document.getElementById('results-topic').textContent=currentTopic.emoji+' '+currentTopic.name;
  document.getElementById('results-stars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('r-score').textContent=score+'/'+total;
  document.getElementById('r-time').textContent=elapsedSeconds+'s';
  document.getElementById('best-time-note').textContent=
    isNewBest&&stars>0?'🏅 ¡Nuevo récord personal!':
    prevBest?'Mejor tiempo anterior: '+prevBest+'s':'';

  // Aprende de tus errores
  const sec=document.getElementById('errores-section');
  const list=document.getElementById('errores-list');
  if(missed.length){
    sec.style.display='block';
    list.innerHTML=missed.map(m=>
      `<div class="error-row">
        <span class="error-es">${escHtml(m.es)}</span>
        <span class="error-arrow">→</span>
        <span class="error-en">${escHtml(m.en)}</span>
      </div>`
    ).join('');
  } else {
    sec.style.display='none';
  }
}

function replayGame(){startGame(currentTopic);}

// ─── Utils ───
const PRAISE=['¡Correcto! 🌟','¡Exacto! ✨','¡Muy bien! 🎉','¡Genial! ⚡','¡Perfecto! 🏆','¡Brillante! 🔥'];
function randomPraise(){return PRAISE[Math.floor(Math.random()*PRAISE.length)];}
function normalise(s){return String(s).toLowerCase().trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?!]/g,'').replace(/\s+/g,' ');}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function burst(el){
  const emojis=['⭐','✨','🌟','💫','🎉'];
  const rect=el.getBoundingClientRect();
  for(let i=0;i<5;i++){
    const f=document.createElement('div');f.className='floater';
    f.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    f.style.left=(rect.left+rect.width/2+Math.random()*40-20)+'px';
    f.style.top=(rect.top+rect.height/2)+'px';
    f.style.animationDelay=(i*0.08)+'s';
    document.body.appendChild(f);setTimeout(()=>f.remove(),1000);
  }
}

initSpeech();
renderHub();
</script>
