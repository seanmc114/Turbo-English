<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#a855f7">
<title>Turbo English B2 · Intermedio</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800;900&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--blue:#1a47b8;--sun:#f5a623;--sun-deep:#e07b00;--terra:#c94f2c;--sky:#4ab8f5;--sand:#fff9ef;--ink:#1c1208;--muted:#7a6a58;--shadow:rgba(28,18,8,0.09);--green:#22c55e;--red:#e03c2c;--lc:#a855f7;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--sand);color:var(--ink);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;}
.sky-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:linear-gradient(180deg,#87ceeb 0%,#b8e4f7 28%,#d8eefa 52%,#fff9ef 100%);}
.sun-orb{position:fixed;top:-55px;right:-35px;width:200px;height:200px;border-radius:50%;z-index:0;pointer-events:none;background:radial-gradient(circle at 38% 38%,#ffe877,#f5a623 55%,#e07b00);box-shadow:0 0 0 28px rgba(245,166,35,0.09),0 0 0 60px rgba(245,166,35,0.05);animation:sunpulse 5s ease-in-out infinite;}
@keyframes sunpulse{0%,100%{box-shadow:0 0 0 28px rgba(245,166,35,0.09),0 0 0 60px rgba(245,166,35,0.05);}50%{box-shadow:0 0 0 38px rgba(245,166,35,0.12),0 0 0 80px rgba(245,166,35,0.07);}}
.clouds{position:fixed;top:0;left:0;right:0;height:220px;z-index:0;pointer-events:none;overflow:hidden;}
.cloud{position:absolute;background:white;border-radius:50px;opacity:0.8;animation:drift linear infinite;}
.cloud::before,.cloud::after{content:'';position:absolute;background:white;border-radius:50%;}
.c1{width:110px;height:32px;top:28px;animation-duration:70s;animation-delay:-5s;}.c1::before{width:52px;height:48px;top:-25px;left:14px;}.c1::after{width:40px;height:36px;top:-17px;left:50px;}
.c2{width:80px;height:24px;top:68px;animation-duration:90s;animation-delay:-40s;opacity:0.55;}.c2::before{width:38px;height:34px;top:-18px;left:10px;}.c2::after{width:30px;height:26px;top:-13px;left:34px;}
.c3{width:130px;height:36px;top:12px;animation-duration:115s;animation-delay:-65s;opacity:0.65;}.c3::before{width:62px;height:54px;top:-28px;left:18px;}.c3::after{width:48px;height:42px;top:-20px;left:62px;}
.c4{width:68px;height:20px;top:90px;animation-duration:80s;animation-delay:-25s;opacity:0.4;}.c4::before{width:32px;height:28px;top:-15px;left:8px;}.c4::after{width:26px;height:22px;top:-10px;left:30px;}
@keyframes drift{from{transform:translateX(-220px);}to{transform:translateX(calc(100vw + 220px));}}
.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 18px 80px;}
.site-header{padding:24px 0 16px;text-align:center;animation:riseUp 0.6s ease both;}
.back-link{display:inline-flex;align-items:center;gap:6px;background:var(--blue);color:white;text-decoration:none;font-size:12px;font-weight:800;padding:6px 14px;border-radius:20px;margin-bottom:12px;letter-spacing:0.05em;box-shadow:0 3px 10px rgba(26,71,184,0.25);}
.brand-turbo{font-family:'Boogaloo',cursive;font-size:clamp(36px,10vw,48px);line-height:0.88;color:var(--sun-deep);-webkit-text-stroke:2px var(--terra);text-shadow:4px 4px 0 rgba(201,79,44,0.18);display:block;}
.brand-english{font-family:'Boogaloo',cursive;font-size:clamp(26px,7vw,34px);line-height:0.9;color:var(--blue);-webkit-text-stroke:1.5px var(--ink);text-shadow:3px 3px 0 rgba(28,18,8,0.1);display:block;}
.level-pill{display:inline-block;background:var(--lc);color:white;font-family:'Boogaloo',cursive;font-size:14px;padding:4px 16px;border-radius:20px;letter-spacing:1px;margin-top:8px;}
.sec-label{font-size:10px;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-left:2px;display:flex;align-items:center;gap:10px;}
.sec-label::after{content:'';flex:1;height:2px;background:linear-gradient(to right,rgba(26,71,184,0.15),transparent);border-radius:2px;}
.tile-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px;}
.tile{background:white;border-radius:16px;padding:0;cursor:pointer;transition:transform 0.15s,box-shadow 0.18s;box-shadow:0 4px 16px var(--shadow);position:relative;overflow:hidden;border:none;text-align:left;width:100%;}
.tile:active{transform:scale(0.97);box-shadow:0 2px 8px var(--shadow);}
.tile-stripe{height:5px;background:linear-gradient(90deg,var(--lc),var(--sky));}
.tile-body{padding:12px 12px 12px;}
.tile-emoji{font-size:1.8rem;display:block;margin-bottom:5px;}
.tile-name{font-family:'Boogaloo',cursive;font-size:1rem;color:var(--ink);line-height:1.2;margin-bottom:2px;}
.tile-sub{font-size:0.68rem;color:var(--muted);font-weight:600;margin-bottom:7px;}
.tile-stars{font-size:0.78rem;letter-spacing:2px;}
/* GAME */
#game-view{display:none;}
#results-view{display:none;}
.game-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-top:22px;}
.back-btn{background:var(--blue);border:none;color:white;border-radius:50%;width:36px;height:36px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 10px rgba(26,71,184,0.3);}
.game-topic-name{font-family:'Boogaloo',cursive;font-size:1.25rem;color:var(--ink);flex:1;}
.stat-box{background:white;border-radius:12px;padding:5px 12px;text-align:center;box-shadow:0 3px 10px var(--shadow);}
.stat-val{font-family:'Boogaloo',cursive;font-size:1.2rem;color:var(--blue);display:block;}
.stat-label{font-size:0.6rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}
.progress-bar-wrap{background:rgba(0,0,0,0.06);border-radius:10px;height:6px;margin-bottom:18px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--lc),var(--sky));border-radius:10px;transition:width 0.3s;}
.question-card{background:white;border-radius:20px;overflow:hidden;margin-bottom:14px;box-shadow:0 6px 24px var(--shadow);}
.question-stripe{height:5px;background:linear-gradient(90deg,var(--lc),var(--sky));}
.question-body{padding:22px 20px 18px;text-align:center;}
.q-prompt-label{font-size:0.68rem;font-weight:800;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.q-spanish{font-family:'Boogaloo',cursive;font-size:2rem;color:var(--ink);margin-bottom:6px;line-height:1.2;}
.q-hint{font-size:0.78rem;color:var(--muted);font-style:italic;min-height:1.2em;}
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.ans-btn{background:white;border:2px solid rgba(0,0,0,0.07);border-radius:14px;color:var(--ink);font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:700;padding:13px 8px;cursor:pointer;transition:all 0.15s;text-align:center;line-height:1.2;box-shadow:0 3px 10px var(--shadow);}
.ans-btn:active{transform:scale(0.97);}
.ans-btn.correct{background:#e8faf0;border-color:var(--green);color:#166534;}
.ans-btn.wrong{background:#fef2f2;border-color:var(--red);color:var(--red);}
.ans-btn:disabled{cursor:default;}
.feedback-row{text-align:center;min-height:32px;font-family:'Boogaloo',cursive;font-size:1.25rem;margin-bottom:6px;}
.feedback-correct{color:var(--green);}.feedback-wrong{color:var(--red);}
.results-card{background:white;border-radius:22px;overflow:hidden;box-shadow:0 8px 30px var(--shadow);margin-top:22px;}
.results-stripe{height:6px;background:linear-gradient(90deg,var(--lc),var(--sky),var(--sun));}
.results-body{padding:28px 22px;text-align:center;}
.results-emoji{font-size:3.5rem;display:block;margin-bottom:10px;}
.results-title{font-family:'Boogaloo',cursive;font-size:2rem;color:var(--ink);margin-bottom:4px;}
.results-topic{color:var(--muted);font-size:0.85rem;font-weight:600;margin-bottom:18px;}
.results-stars{font-size:2.2rem;margin-bottom:18px;display:block;letter-spacing:4px;}
.results-stats{display:flex;justify-content:center;gap:16px;margin-bottom:20px;}
.r-stat{background:var(--sand);border-radius:14px;padding:14px 20px;text-align:center;}
.r-stat-val{font-family:'Boogaloo',cursive;font-size:1.8rem;color:var(--blue);display:block;}
.r-stat-label{font-size:0.68rem;font-weight:800;color:var(--muted);text-transform:uppercase;}
.best-time-note{font-size:0.8rem;font-weight:700;color:var(--terra);margin-bottom:18px;min-height:1.2em;}
.btn-primary{background:linear-gradient(135deg,var(--lc),var(--sky));color:white;border:none;border-radius:14px;font-family:'Boogaloo',cursive;font-size:1.2rem;padding:14px 28px;cursor:pointer;box-shadow:0 5px 18px rgba(26,71,184,0.25);display:inline-block;margin:5px;}
.btn-secondary{background:white;color:var(--blue);border:2px solid rgba(26,71,184,0.2);border-radius:14px;font-family:'Boogaloo',cursive;font-size:1.1rem;padding:13px 24px;cursor:pointer;display:inline-block;margin:5px;box-shadow:0 3px 10px var(--shadow);}
.footer-copy{text-align:center;font-size:11px;font-weight:700;color:rgba(28,18,8,0.3);letter-spacing:0.04em;padding:24px 0 10px;}
@keyframes riseUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>

</div>

  {id:"phrasal3",emoji:"🔑",name:"Phrasal verbs III",sub:"Phrasal verbs in context",words:[{es:"quitarse de encima",en:"to get rid of"},{es:"sacar a colación",en:"to bring up a topic"},{es:"tirar adelante",en:"to pull through"},{es:"vérselas con",en:"to deal with"},{es:"engañar",en:"to take in / fool"},{es:"aclarar",en:"to sort out"},{es:"apuntarse a",en:"to sign up for"},{es:"darse cuenta de",en:"to realise"},{es:"volver a la normalidad",en:"to get back to normal"},{es:"ponerse a trabajar",en:"to get down to it"},{es:"repasar",en:"to go over"},{es:"poner en práctica",en:"to put into practice"},{es:"anular",en:"to call off"},{es:"encargarse de",en:"to take care of"},{es:"mantenerse firme",en:"to stand firm"},{es:"sacar partido de",en:"to make the most of"},{es:"estar de acuerdo con",en:"to go along with"},{es:"trasladar la culpa",en:"to pass the blame on"},{es:"aplazar indefinidamente",en:"to shelve"},{es:"presentar a alguien",en:"to introduce someone"}]},
];

let currentTopic=null,currentWords=[],currentIndex=0,score=0,startTime=null,timerInterval=null,elapsedSeconds=0,answered=false;

function renderHub(){
  const grid=document.getElementById('tile-grid');grid.innerHTML='';
  TOPICS.forEach(t=>{
    const stars=getStars(t.id);const s=stars>0?'⭐'.repeat(stars)+'☆'.repeat(3-stars):'☆☆☆';
    const d=document.createElement('button');d.className='tile';
    d.innerHTML=`<div class="tile-stripe"></div><div class="tile-body"><span class="tile-emoji">${t.emoji}</span><div class="tile-name">${t.name}</div><div class="tile-sub">${t.sub}</div><div class="tile-stars">${s}</div></div>`;
    d.onclick=()=>startGame(t);grid.appendChild(d);
  });
}
function showHub(){
  document.getElementById('hub-view').style.display='block';
  document.getElementById('game-view').style.display='none';
  document.getElementById('results-view').style.display='none';
  clearInterval(timerInterval);renderHub();
}
function startGame(t){
  currentTopic=t;currentWords=shuffle([...t.words]);currentIndex=0;score=0;elapsedSeconds=0;
  document.getElementById('hub-view').style.display='none';
  document.getElementById('game-view').style.display='block';
  document.getElementById('results-view').style.display='none';
  document.getElementById('game-topic-name').textContent=t.emoji+' '+t.name;
  document.getElementById('stat-score').textContent='0';
  document.getElementById('stat-timer').textContent='0s';
  document.getElementById('feedback-row').textContent='';
  startTime=Date.now();clearInterval(timerInterval);
  timerInterval=setInterval(()=>{elapsedSeconds=Math.floor((Date.now()-startTime)/1000);document.getElementById('stat-timer').textContent=elapsedSeconds+'s';},500);
  showQuestion();
}
function showQuestion(){
  if(currentIndex>=currentWords.length){endGame();return;}
  answered=false;
  const w=currentWords[currentIndex];
  document.getElementById('q-spanish').textContent=w.es;
  document.getElementById('q-hint').textContent='';
  document.getElementById('feedback-row').textContent='';
  document.getElementById('progress-bar').style.width=(currentIndex/currentWords.length*100)+'%';
  const correct=w.en;
  const others=shuffle(currentWords.filter((_,i)=>i!==currentIndex).map(x=>x.en)).slice(0,3);
  const opts=shuffle([correct,...others]);
  const grid=document.getElementById('answers-grid');grid.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');b.className='ans-btn';b.textContent=o;
    b.onclick=()=>selectAnswer(b,o,correct);grid.appendChild(b);
  });
}
function selectAnswer(btn,chosen,correct){
  if(answered)return;answered=true;
  document.querySelectorAll('.ans-btn').forEach(b=>{b.disabled=true;if(b.textContent===correct)b.classList.add('correct');});
  if(chosen===correct){btn.classList.add('correct');score++;document.getElementById('stat-score').textContent=score;document.getElementById('feedback-row').innerHTML='<span class="feedback-correct">✓ Correct!</span>';}
  else{btn.classList.add('wrong');document.getElementById('feedback-row').innerHTML=`<span class="feedback-wrong">✗ <em>${correct}</em></span>`;}
  currentIndex++;setTimeout(showQuestion,1100);
}
function endGame(){
  clearInterval(timerInterval);
  const total=currentWords.length,pct=score/total;
  const stars=pct>=0.9?3:pct>=0.6?2:pct>=0.3?1:0;
  const prevBest=getBestTime(currentTopic.id);
  const isNewBest=prevBest===null||elapsedSeconds<prevBest;
  saveResult(currentTopic.id,stars,elapsedSeconds);
  document.getElementById('hub-view').style.display='none';
  document.getElementById('game-view').style.display='none';
  document.getElementById('results-view').style.display='block';
  document.getElementById('results-emoji').textContent=['😬','👏','🎉','🏆'][stars];
  document.getElementById('results-topic').textContent=currentTopic.emoji+' '+currentTopic.name;
  document.getElementById('results-stars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('r-score').textContent=score+'/'+total;
  document.getElementById('r-time').textContent=elapsedSeconds+'s';
  document.getElementById('best-time-note').textContent=isNewBest&&stars>0?'🏆 ¡Nuevo récord personal!':prevBest?'Mejor tiempo anterior: '+prevBest+'s':'';
}
function replayGame(){startGame(currentTopic);}
function getStars(id){return parseInt(localStorage.getItem(STORAGE_PREFIX+id+'_stars')||'0');}
function getBestTime(id){const v=localStorage.getItem(STORAGE_PREFIX+id+'_best');return v===null?null:parseInt(v);}
function saveResult(id,stars,time){
  if(stars>getStars(id))localStorage.setItem(STORAGE_PREFIX+id+'_stars',stars);
  const p=getBestTime(id);if(p===null||time<p)localStorage.setItem(STORAGE_PREFIX+id+'_best',time);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
renderHub();
</script>
